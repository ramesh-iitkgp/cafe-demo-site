<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open House Cafe | Siliguri</title>
  </head>
  <body>
    <div id="root"></div>
    
    <!-- Dynamic WhatsApp Injection -->
    <script>
        // Read URL parameters
        const params = new URLSearchParams(window.location.search);
        const nameSlug = params.get('name') || '';
        const location = params.get('location') || '';
        const phone = (params.get('phone') || '').replace(/\D/g, '');

        function slugToTitle(slug) {
            if (!slug) return 'Business';
            return slug
                .split('-')
                .map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase())
                .join(' ');
        }

        const businessName = slugToTitle(nameSlug);

        document.addEventListener('DOMContentLoaded', function() {
            // Build WhatsApp link if phone present
            if (phone) {
                const messageParts = [];
                if (businessName) messageParts.push(businessName);
                if (location) messageParts.push(location);
                const message = encodeURIComponent(messageParts.join(' - '));
                const waUrl = `https://wa.me/${phone}?text=${message}`;

                // Update obvious WhatsApp buttons/links
                const selectors = [
                    'a[href*="wa.me"]',
                    'a[href*="whatsapp"]',
                    '#whatsappNav',
                    '.whatsapp-btn',
                    '.btn-whatsapp'
                ];

                const anchors = document.querySelectorAll(selectors.join(','));
                anchors.forEach(a => {
                    a.setAttribute('href', waUrl);
                    a.setAttribute('target', '_blank');
                    a.setAttribute('rel', 'noopener');
                });
            }

            // Best-effort: update obvious name/location placeholders
            if (businessName) {
                document.querySelectorAll('[id*="name" i], [id*="title" i]').forEach(el => {
                    if (el.textContent && el.textContent.length < 80) {
                        el.textContent = businessName;
                    }
                });
            }
            if (location) {
                document.querySelectorAll('[id*="location" i], [id*="city" i]').forEach(el => {
                    if (el.textContent && el.textContent.length < 80) {
                        el.textContent = location;
                    }
                });
            }
        });
    </script>
</body>
</html>
