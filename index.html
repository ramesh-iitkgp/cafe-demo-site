<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☕ Coffee Cafe</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #6F4E37 0%, #333 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 800px;
            padding: 60px 40px;
            text-align: center;
        }
        .icon { font-size: 70px; margin-bottom: 20px; }
        h1 { color: #6F4E37; font-size: 2.5em; margin: 20px 0; }
        .subtitle { color: #666; font-size: 1.1em; margin: 20px 0 40px; }
        .content { text-align: left; background: #f8f9fa; padding: 30px; border-radius: 10px; margin: 30px 0; }
        .footer { color: #999; margin-top: 40px; font-size: 0.9em; }
        .btn { 
            background: #6F4E37;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1em;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">☕</div>
        <h1>Coffee Cafe</h1>
        <div class="subtitle">Professional Demo Website 2026</div>
        
        <div class="content">
            <h2 style="color: #6F4E37; margin-bottom: 15px;">Welcome</h2>
            <p>This is a unique demonstration website for Coffee Cafe. Each business category has its own distinct design and branding.</p>
        </div>
        
        <button class="btn">Learn More</button>
        
        <div class="footer">
            <p>© 2026 Coffee Cafe | Demo Website</p>
        </div>
    </div>
</body>
</html>
