<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open House Cafe | Siliguri</title>
    <script type="module" crossorigin src="./assets/index-CnolFtHv.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CLvP9P2i.css">
  </head>
  <body>
    <div id="root"></div>
  
    <!-- Dynamic WhatsApp Injection (post-build) -->
    <script>
        const params = new URLSearchParams(window.location.search);
        const nameSlug = params.get('name') || '';
        const cityLocation = params.get('location') || '';
        const phone = (params.get('phone') || '').replace(/\D/g, '');

        function slugToTitle(slug) {
            if (!slug) return 'Business';
            return slug.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
        }

        const businessName = slugToTitle(nameSlug);

        function replaceInElement(el) {
            if (!el || !el.childNodes) return;
            for (let i = 0; i < el.childNodes.length; i++) {
                const node = el.childNodes[i];
                if (node.nodeType === 3) {
                    let text = node.textContent;
                    let originalText = text;
                    text = text.replace(/GENTLEMAN'S\s*&\s*CO\./gi, businessName.toUpperCase());
                    text = text.replace(/BLADE\s*&\s*CO\./gi, businessName.toUpperCase());
                    text = text.replace(/OPEN\s*HOUSE\s*CAFE/gi, businessName.toUpperCase());
                    text = text.replace(/GENTLEMANS_BARBER/gi, '@' + nameSlug);
                    text = text.replace(/Siliguri/gi, cityLocation || 'Location');
                    if (text !== originalText) node.textContent = text;
                } else if (node.nodeType === 1 && node.nodeName !== 'SCRIPT' && node.nodeName !== 'STYLE') {
                    replaceInElement(node);
                }
            }
        }

        function applyUpdates() {
            if (businessName) {
                try { document.title = cityLocation ? `${businessName} | ${cityLocation}` : businessName; } catch (e) {}
                replaceInElement(document.body);
            }

            if (phone) {
                const parts = [businessName, cityLocation].filter(Boolean);
                const msg = encodeURIComponent(parts.join(' - '));
                const url = `https://wa.me/${phone}?text=${msg}`;
                document.querySelectorAll('a[href*="wa.me"], a[href*="whatsapp"], [href*="gentlemans"], .whatsapp-btn, .btn-whatsapp').forEach(a => {
                    a.setAttribute('href', url);
                    a.setAttribute('target', '_blank');
                    a.setAttribute('rel', 'noopener');
                });
            }
        }

        applyUpdates();
        setTimeout(applyUpdates, 300);
        setTimeout(applyUpdates, 800);
        setTimeout(applyUpdates, 1500);
        setTimeout(applyUpdates, 3000);
        
        new MutationObserver(() => applyUpdates()).observe(document.body, { childList: true, subtree: true, characterData: true });
    </script>
</body>
</html>
