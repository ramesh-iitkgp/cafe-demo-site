<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open House Cafe | Siliguri</title>
    <script type="module" crossorigin src="./assets/index-DyMKwZJA.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CLvP9P2i.css">
  </head>
  <body>
    <div id="root"></div>
  
    <!-- Dynamic WhatsApp Injection (post-build) -->
    <script>
        const params = new URLSearchParams(window.location.search);
        const nameSlug = params.get('name') || '';
        const location = params.get('location') || '';
        const phone = (params.get('phone') || '').replace(/\D/g, '');

        function slugToTitle(slug) {
            if (!slug) return 'Business';
            return slug
                .split('-')
                .map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase())
                .join(' ');
        }

        const businessName = slugToTitle(nameSlug);

        document.addEventListener('DOMContentLoaded', function() {
            if (phone) {
                const parts = [];
                if (businessName) parts.push(businessName);
                if (location) parts.push(location);
                const msg = encodeURIComponent(parts.join(' - '));
                const url = `https://wa.me/${phone}?text=${msg}`;

                const selectors = [
                    'a[href*="wa.me"]',
                    'a[href*="whatsapp"]',
                    '#whatsappNav',
                    '.whatsapp-btn',
                    '.btn-whatsapp',
                ];
                document.querySelectorAll(selectors.join(',')).forEach(a => {
                    a.setAttribute('href', url);
                    a.setAttribute('target', '_blank');
                    a.setAttribute('rel', 'noopener');
                });
            }

            if (businessName) {
                document.querySelectorAll('[id*="name" i], [id*="title" i]').forEach(el => {
                    if (el.textContent && el.textContent.length < 80) {
                        el.textContent = businessName;
                    }
                });
            }

            if (location) {
                document.querySelectorAll('[id*="location" i], [id*="city" i]').forEach(el => {
                    if (el.textContent && el.textContent.length < 80) {
                        el.textContent = location;
                    }
                });
            }
        });
    </script>
</body>
</html>
